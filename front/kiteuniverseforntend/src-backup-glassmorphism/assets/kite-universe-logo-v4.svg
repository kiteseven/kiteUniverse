<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- V4 logo: anime-style side silhouette inspired by the original full-body character reference. -->
  <defs>
    <radialGradient id="ku4-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(252 244) rotate(90) scale(176)">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.58" stop-color="#EFF6FF" />
      <stop offset="1" stop-color="#DDEBFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ku4-base" x1="160" y1="92" x2="350" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.56" stop-color="#F4F6FF" />
      <stop offset="1" stop-color="#DFE4FF" />
    </linearGradient>
    <linearGradient id="ku4-accent" x1="150" y1="220" x2="284" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9FB4FF" />
      <stop offset="0.5" stop-color="#607BFF" />
      <stop offset="1" stop-color="#3146D8" />
    </linearGradient>
    <linearGradient id="ku4-shadow" x1="230" y1="222" x2="330" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2B313E" />
      <stop offset="1" stop-color="#181D27" />
    </linearGradient>
    <filter id="ku4-drop" x="74" y="52" width="364" height="392" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#29527E" flood-opacity="0.14" />
    </filter>
  </defs>

  <ellipse cx="250" cy="244" rx="166" ry="174" fill="url(#ku4-glow)" />

  <g filter="url(#ku4-drop)">
    <!-- Main profile silhouette. -->
    <path
      d="M154 404
         C170 364 178 324 176 280
         C174 236 184 194 206 158
         C224 130 252 112 286 110
         C280 92 286 76 302 70
         C322 62 342 70 352 88
         C362 108 360 128 346 144
         C368 156 386 174 394 200
         C404 230 398 266 378 294
         C364 314 344 328 330 340
         C320 348 316 360 320 372
         C330 400 356 402 372 408
         L300 408
         C288 392 280 370 276 344
         C264 348 248 356 230 372
         C206 392 184 404 154 404Z"
      fill="url(#ku4-base)"
      stroke="#181B26"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Back hair and lower coat accent to push the anime silhouette feeling. -->
    <path
      d="M160 216
         C144 248 142 292 152 334
         C162 374 184 398 220 408
         C216 370 212 336 206 302
         C198 262 186 234 160 216Z"
      fill="url(#ku4-accent)"
      stroke="#181B26"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Front bang that cuts across the face like the reference. -->
    <path
      d="M232 116
         C212 126 198 146 194 174
         C188 208 194 246 212 286
         C224 272 232 252 236 224
         C242 184 252 154 272 128
         C258 118 244 114 232 116Z"
      fill="url(#ku4-accent)"
      stroke="#181B26"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Shoulder and collar silhouette. -->
    <path
      d="M246 314
         C236 334 234 360 238 408
         L316 408
         C310 374 306 350 304 334
         C300 320 292 312 278 308
         L246 314Z"
      fill="url(#ku4-shadow)"
      stroke="#181B26"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M248 300
         H288
         L298 316
         L272 328
         L242 318
         L248 300Z"
      fill="#2F81F5"
      stroke="#181B26"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Blue hanging earring from the original reference. -->
    <rect
      x="286"
      y="222"
      width="18"
      height="54"
      rx="9"
      fill="#7DB9FF"
      stroke="#181B26"
      stroke-width="8"
    />

    <!-- Small facial cut marks to keep the silhouette readable and anime-like. -->
    <path d="M292 198C308 198 318 208 320 226" stroke="#181B26" stroke-width="8" stroke-linecap="round" />
    <path d="M294 242C304 242 310 248 312 258" stroke="#181B26" stroke-width="8" stroke-linecap="round" />
    <path d="M290 280C298 286 302 294 302 304" stroke="#181B26" stroke-width="8" stroke-linecap="round" />

    <!-- Hair tip and ahoge echo the original character. -->
    <path d="M278 110C284 90 300 78 316 82C328 86 336 98 334 112" stroke="#181B26" stroke-width="8" stroke-linecap="round" />
    <path d="M280 108C290 86 306 80 320 84C308 92 300 104 296 118" fill="#E7EBFF" stroke="#181B26" stroke-width="8" stroke-linejoin="round" />
  </g>
</svg>
