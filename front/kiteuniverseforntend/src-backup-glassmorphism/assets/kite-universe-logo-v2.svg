<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- V2 chibi anime logo with a sticker-like silhouette for header and hero usage. -->
  <defs>
    <radialGradient id="ku2-bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 244) rotate(90) scale(188)">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.58" stop-color="#EEF6FF" />
      <stop offset="1" stop-color="#D7E9FF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ku2-hair" x1="184" y1="118" x2="330" y2="302" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.62" stop-color="#F5F7FF" />
      <stop offset="1" stop-color="#DDE3FF" />
    </linearGradient>
    <linearGradient id="ku2-tip" x1="172" y1="250" x2="338" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8BA7FF" />
      <stop offset="0.54" stop-color="#5673FF" />
      <stop offset="1" stop-color="#2C41D8" />
    </linearGradient>
    <linearGradient id="ku2-eye" x1="204" y1="214" x2="304" y2="282" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#91D5FF" />
      <stop offset="0.56" stop-color="#4A6DFF" />
      <stop offset="1" stop-color="#25357F" />
    </linearGradient>
    <linearGradient id="ku2-coat" x1="214" y1="332" x2="300" y2="426" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#757D8C" />
      <stop offset="1" stop-color="#373B48" />
    </linearGradient>
    <filter id="ku2-shadow" x="72" y="52" width="368" height="396" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2A578F" flood-opacity="0.16" />
    </filter>
  </defs>

  <ellipse cx="256" cy="250" rx="170" ry="176" fill="url(#ku2-bg)" />

  <g filter="url(#ku2-shadow)" stroke="#181B26" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
