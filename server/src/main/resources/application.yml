server:
  port: 8081

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    driver-class-name: ${kite-universe.datasource.driver-class-name}
    url: jdbc:mysql://${kite-universe.datasource.host}:${kite-universe.datasource.port}/${kite-universe.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${kite-universe.datasource.username}
    password: ${kite-universe.datasource.password}
  data:
    redis:
      host: ${kite-universe.redis.host}
      database: ${kite-universe.redis.database}
      port: ${kite-universe.redis.port}
    elasticsearch:
      repositories:
        enabled: true
  elasticsearch:
    uris: ${kite-universe.elasticsearch.uris:http://localhost:9200}
  rabbitmq:
    host: ${kite-universe.rabbitmq.host:localhost}
    port: ${kite-universe.rabbitmq.port:5672}
    username: ${kite-universe.rabbitmq.username:guest}
    password: ${kite-universe.rabbitmq.password:guest}
    virtual-host: ${kite-universe.rabbitmq.virtual-host:/}

mybatis:
  # mapper 配置文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名扫描包
  type-aliases-package: org.kiteseven.kiteuniverse.pojo
  configuration:
    # 开启下划线到驼峰的自动映射
    map-underscore-to-camel-case: true

logging:
  level:
    org:
      kiteseven:
        kiteuniverse:
          mapper: debug
          service: info
          controller: info

kite-universe:
  auth:
    sms-send-cooldown-seconds: 60
    sms-daily-limit-per-phone: 20
    sms-ip-window-seconds: 300
    sms-ip-window-limit: 10
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  notification:
    mq:
      enabled: true
      exchange: notification.command.exchange
      queue: notification.command.queue
      routing-key: notification.command
      dead-letter-exchange: notification.command.dlx
      dead-letter-queue: notification.command.dlq
      dead-letter-routing-key: notification.command.dlq
  content:
    home-cache-seconds: 300
    home-local-cache-seconds: 30
    boards-cache-seconds: 300
    boards-local-cache-seconds: 30
  cache:
    two-level:
      enabled: true
      default-local-ttl-seconds: 30
      default-redis-ttl-seconds: 300
      local-maximum-size: 1000
      invalidation-topic: cache:two-level:invalidate
  file:
    upload-dir: ./uploads
    public-base-path: /uploads
    avatar-dir: avatars
  redis:
    key-prefix: kite-universe
    lock:
      enabled: true
      key-prefix: lock
      wait-time-millis: 1500
      lease-time-millis: 5000
    bloom-filter:
      enabled: true
      user:
        key: bloom-filter:user-ids
        expected-insertions: 200000
        false-probability: 0.001
      post:
        key: bloom-filter:post-ids
        expected-insertions: 200000
        false-probability: 0.001
