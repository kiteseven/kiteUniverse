# 开发环境示例配置。
# 使用前请复制为 application-dev.yml，并替换成你自己的本地配置与密钥。
kite-universe:
  datasource:
    # 本地 MySQL 驱动类名。
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 本地数据库主机地址。
    host: localhost
    # 本地数据库端口。
    port: 3306
    # 项目使用的数据库名称。
    database: kite_universe
    # 本地数据库用户名。
    username: your_mysql_username
    # 本地数据库密码。
    password: your_mysql_password
  alioss:
    # 阿里云 OSS 访问域名。
    endpoint: oss-cn-beijing.aliyuncs.com
    # 阿里云 OSS AccessKey ID。
    access-key-id: your_aliyun_oss_access_key_id
    # 阿里云 OSS AccessKey Secret。
    access-key-secret: your_aliyun_oss_access_key_secret
    # 阿里云 OSS Bucket 名称。
    bucket-name: your_bucket_name
  jwt:
    # 用户登录态签名密钥，建议至少 32 位。
    user-secret-key-string: change-this-to-your-own-jwt-secret-with-32-chars
    # 用户令牌有效期，单位为毫秒。
    user-ttl: 7200000
    # 用户令牌名称。
    user-token-name: authentication
  file:
    # 本地上传文件存储目录。
    upload-dir: ../uploads
  baidutranslation:
    # 百度翻译开放平台 APP ID。
    APP_ID: your_baidu_translate_app_id
    # 百度翻译开放平台密钥。
    SECRET_KEY: your_baidu_translate_secret_key
    # 百度翻译接口地址。
    TRANSLATE_URL: https://fanyi-api.baidu.com/api/trans/vip/translate
  redis:
    # 本地 Redis 主机地址。
    host: localhost
    # 本地 Redis 端口。
    port: 6379
    # 项目使用的 Redis 数据库编号。
    database: 0
    # 项目 Redis 键前缀。
    key-prefix: kite-universe
